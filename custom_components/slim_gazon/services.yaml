calculate_plan:
  fields:
    test_fase:
      required: false
      selector:
        select:
          options:
            - pas_ingezaaid
            - kiemend
            - jong_gras
            - bestaand_gras
            - alleen_handmatig
    test_temp_max:
      required: false
      selector:
        number:
          min: -10
          max: 50
          step: 0.5
          unit_of_measurement: "°C"
    test_regen_vandaag:
      required: false
      selector:
        number:
          min: 0
          max: 50
          step: 0.1
          unit_of_measurement: mm
    test_regen_24u:
      required: false
      selector:
        number:
          min: 0
          max: 50
          step: 0.1
          unit_of_measurement: mm
    test_wind:
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: km/h
    test_automatisering_aan:
      required: false
      selector:
        boolean:

run_cycle:
  fields:
    big_minutes:
      required: true
      selector:
        number:
          min: 0
          max: 60
          step: 0.1
          unit_of_measurement: min
          mode: box
    small_minutes:
      required: true
      selector:
        number:
          min: 0
          max: 60
          step: 0.1
          unit_of_measurement: min
          mode: box
    reason:
      required: false
      selector:
        text:
    slot:
      required: false
      selector:
        text:
    force_test:
      required: false
      selector:
        boolean:

start_big:
  fields:
    minutes:
      required: true
      selector:
        number:
          min: 0.1
          max: 60
          step: 0.1
          unit_of_measurement: min
          mode: box

start_small:
  fields:
    minutes:
      required: true
      selector:
        number:
          min: 0.1
          max: 60
          step: 0.1
          unit_of_measurement: min
          mode: box

manual_short:

manual_normal:

stop_all:

test_scenario:
  fields:
    scenario:
      required: true
      selector:
        select:
          options:
            - 10c_geen_regen
            - 15c_geen_regen
            - 20c_geen_regen
            - 25c_geen_regen
            - 30c_geen_regen
            - 35c_geen_regen
            - 40c_geen_regen
            - 30c_5mm_regen_verwacht
            - 30c_5mm_regen_24u
            - 35c_harde_wind
            - automatisering_uit
            - sensoren_onbekend
